services:
  - type: web
    name: jewellery-khazana-orders
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATA_DIR
        value: /data
      - key: NODE_ENV
        value: production
    disk:
      name: jewellery-data
      mountPath: /data
      sizeGB: 1
