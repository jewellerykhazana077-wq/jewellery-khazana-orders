<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jewellery Khazana – Order Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="brand-logo">💎</div>
        <h1>Jewellery Khazana</h1>
        <p>Order Management Dashboard</p>
      </div>
      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <div id="loginError" class="error-msg" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn" style="margin-top:8px">
          Sign In
        </button>
      </form>
    </div>
  </div>
  <script>
    (async () => {
      try {
        const r = await fetch('/api/auth/me');
        if (r.ok) window.location.href = '/app.html';
      } catch {}
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/app.html';
        } else {
          err.textContent = data.error || 'Login failed';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch {
        err.textContent = 'Connection error. Please try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
